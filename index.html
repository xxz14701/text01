<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="01.png">
    <title>銀髮族專用 - 好字好色製作工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'GenSenRounded';
            src: url('GenSenRounded2TW-H.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fef2f2; /* 更柔和的底色 */
        }

        /* 超大滑桿優化，方便長輩手指操作 */
        input[type="range"] {
            height: 45px;
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 36px;
            width: 36px;
            border-radius: 50%;
            background: #e11d48;
            cursor: pointer;
            margin-top: -14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #fbcece;
            border-radius: 6px;
        }

        /* 大尺寸選色器 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 60px;
            height: 60px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .preview-bg {
            background-color: white;
            border: 4px solid #e11d48;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        #text-preview {
            display: inline-block;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'GenSenRounded', "Microsoft JhengHei", sans-serif;
            font-weight: bold;
        }

        .active-btn {
            background-color: #e11d48 !important;
            color: white !important;
            border-color: #be123c !important;
            transform: scale(1.05);
        }

        .step-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            border: 2px solid #fecdd3;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .big-label {
            font-size: 1.25rem;
            font-weight: 800;
            color: #9f1239;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <header class="bg-rose-600 text-white p-8 text-center shadow-xl">
        <h1 class="text-4xl md:text-5xl font-black mb-2">🍎 快樂寫好字 🍎</h1>
        <p class="text-xl opacity-90 font-bold">字體大、顏色美、操作最簡單</p>
    </header>

    <div class="container mx-auto p-4 max-w-6xl">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左側設定：大字、大圖、好點擊 -->
            <div class="w-full lg:w-1/2 space-y-8">
                
                <!-- 1: 寫字 -->
                <div class="step-card">
                    <h2 class="text-2xl font-black mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center">1</span>
                        第一步：寫下您的心願
                    </h2>
                    <textarea id="text-input" rows="2" class="w-full p-5 text-2xl border-4 border-gray-200 rounded-2xl focus:border-rose-500 outline-none transition-all" placeholder="請在此輸入文字...">平安喜樂</textarea>
                    
                    <div class="mt-6">
                        <span class="big-label">文字要擺在哪裡？</span>
                        <div class="flex gap-4">
                            <button onclick="setAlign('left', this)" class="align-btn flex-1 py-4 text-xl rounded-2xl border-4 border-gray-200 font-bold">靠左邊</button>
                            <button onclick="setAlign('center', this)" class="align-btn active-btn flex-1 py-4 text-xl rounded-2xl border-4 border-gray-200 font-bold">擺中間</button>
                            <button onclick="setAlign('right', this)" class="align-btn flex-1 py-4 text-xl rounded-2xl border-4 border-gray-200 font-bold">靠右邊</button>
                        </div>
                    </div>
                </div>

                <!-- 2: 顏色 -->
                <div class="step-card">
                    <h2 class="text-2xl font-black mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center">2</span>
                        第二步：選個漂亮的顏色
                    </h2>
                    <div class="flex gap-4 mb-6">
                        <button id="mode-multi" onclick="setColorMode('multi')" class="mode-btn flex-1 py-4 text-xl rounded-2xl border-4 border-gray-200 font-bold active-btn">每個字不同色</button>
                        <button id="mode-single" onclick="setColorMode('single')" class="mode-btn flex-1 py-4 text-xl rounded-2xl border-4 border-gray-200 font-bold">全部同一個色</button>
                    </div>

                    <div id="single-color-ctrl" class="hidden flex flex-col items-center gap-3 p-6 bg-rose-50 rounded-2xl border-2 border-rose-100">
                        <span class="text-xl font-bold">點擊下方圓圈選顏色：</span>
                        <input type="color" id="single-text-color" value="#e11d48" oninput="updateStyle()">
                    </div>

                    <div id="multi-color-container" class="max-h-60 overflow-y-auto p-4 bg-gray-50 rounded-2xl flex flex-wrap gap-4 justify-center">
                        <!-- 動態生成選色器 -->
                    </div>
                </div>

                <!-- 3: 樣子 -->
                <div class="step-card">
                    <h2 class="text-2xl font-black mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center">3</span>
                        第三步：調整字的大小與間隔
                    </h2>
                    <div class="space-y-8">
                        <div>
                            <label class="big-label">字體大小：<span id="val-font-size" class="text-rose-600">80</span></label>
                            <input type="range" id="font-size" min="40" max="300" value="80">
                        </div>
                        <div>
                            <label class="big-label">上下排的距離：<span id="val-line-height" class="text-rose-600">1.2</span></label>
                            <input type="range" id="line-height" min="0.8" max="3" step="0.1" value="1.2">
                        </div>
                        <div>
                            <label class="big-label">左右字的距離：<span id="val-letter-spacing" class="text-rose-600">2</span></label>
                            <input type="range" id="letter-spacing" min="-5" max="100" value="2">
                        </div>
                    </div>
                </div>

                <!-- 4: 邊框層次 -->
                <div class="step-card">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black flex items-center gap-2">
                            <span class="bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center">4</span>
                            第四步：幫文字穿衣服 (邊框)
                        </h2>
                    </div>
                    <div id="outline-layers-list" class="space-y-4">
                        <!-- 動態邊框 -->
                    </div>
                    <button onclick="addOutlineLayer()" class="mt-4 w-full py-4 bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold rounded-2xl shadow-lg transition-all">
                        ✨ 多加一層邊框 ✨
                    </button>
                    
                    <div class="mt-6 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                        <label class="flex items-center gap-4 cursor-pointer">
                            <input type="checkbox" id="toggle-shadow" class="w-8 h-8 rounded-lg">
                            <span class="text-xl font-bold">增加立體陰影 (看起來更清楚)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 右側預覽：超大預覽區域 -->
            <div class="w-full lg:w-1/2 lg:sticky lg:top-4 h-fit">
                <div class="bg-white p-6 rounded-3xl shadow-2xl border-4 border-gray-100">
                    <h2 class="text-3xl font-black mb-6 text-center text-rose-800">🖼️ 這是您的作品</h2>
                    <div class="preview-bg rounded-2xl overflow-hidden flex justify-center items-center p-10 min-h-[450px]">
                        <div id="text-preview"></div>
                    </div>

                    <!-- 下載區：按鈕超大 -->
                    <div class="mt-10 space-y-6">
                        <div class="bg-gray-100 p-6 rounded-2xl">
                            <span class="big-label">準備好要存起來了嗎？</span>
                            <div class="grid grid-cols-1 gap-4">
                                <button onclick="downloadPNG(false)" class="py-6 bg-green-600 hover:bg-green-700 text-white text-2xl font-black rounded-3xl shadow-xl transform active:scale-95 transition-all">
                                    💾 存成透明圖片 (推薦)
                                </button>
                                <button onclick="downloadPNG(true)" class="py-6 bg-blue-600 hover:bg-blue-700 text-white text-2xl font-black rounded-3xl shadow-xl transform active:scale-95 transition-all">
                                    🖼️ 存成白色背景圖片
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 text-center">
                        <label class="cursor-pointer inline-flex items-center gap-2 text-rose-600 font-bold hover:underline">
                            <input type="file" id="font-upload" accept=".ttf,.otf" class="hidden">
                            <span>📂 如果您有喜歡的字體，請點這裡更換</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const textPreview = document.getElementById('text-preview');
        const outlineLayersList = document.getElementById('outline-layers-list');
        const multiColorContainer = document.getElementById('multi-color-container');

        let colorMode = 'multi';
        let textAlign = 'center';
        let outlineLayers = [
            { width: 4, color: '#000000' }, // 第一層
            { width: 8, color: '#ffffff' }  // 預設給長輩兩層，比較清楚
        ];

        window.onload = () => {
            renderOutlineControls();
            handleTextInput();
            updateStyle();
        };

        textInput.addEventListener('input', handleTextInput);
        ['font-size', 'line-height', 'letter-spacing', 'toggle-shadow', 'single-text-color'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateStyle);
        });

        document.getElementById('font-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const font = new FontFace('userFont', `url(${event.target.result})`);
                font.load().then(f => {
                    document.fonts.add(f);
                    textPreview.style.fontFamily = 'userFont';
                    updateStyle();
                });
            };
            reader.readAsDataURL(file);
        });

        function handleTextInput() {
            const text = textInput.value;
            const currentColors = Array.from(document.querySelectorAll('.char-picker')).map(p => p.value);
            multiColorContainer.innerHTML = '';
            
            const palette = ['#e11d48', '#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777'];
            let charIndex = 0;

            text.split('').forEach(char => {
                if (char === '\n') return;
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center bg-white p-3 rounded-2xl border-2 border-gray-100 shadow-sm';
                div.innerHTML = `
                    <span class="text-xl font-black mb-2">${char}</span>
                    <input type="color" class="char-picker" value="${currentColors[charIndex] || palette[charIndex % palette.length]}" oninput="updateStyle()">
                `;
                multiColorContainer.appendChild(div);
                charIndex++;
            });
            updateStyle();
        }

        function setColorMode(mode) {
            colorMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active-btn', b.id === `mode-${mode}`));
            document.getElementById('single-color-ctrl').classList.toggle('hidden', mode !== 'single');
            document.getElementById('multi-color-container').classList.toggle('hidden', mode !== 'multi');
            updateStyle();
        }

        function setAlign(align, btn) {
            textAlign = align;
            document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            updateStyle();
        }

        function addOutlineLayer() {
            outlineLayers.push({ width: 6, color: '#ffffff' });
            renderOutlineControls();
            updateStyle();
        }

        function removeOutlineLayer(index) {
            if (outlineLayers.length <= 1) return;
            outlineLayers.splice(index, 1);
            renderOutlineControls();
            updateStyle();
        }

        function renderOutlineControls() {
            outlineLayersList.innerHTML = '';
            outlineLayers.forEach((layer, index) => {
                const div = document.createElement('div');
                div.className = 'bg-rose-50 p-5 rounded-2xl border-2 border-rose-100 flex flex-wrap items-center gap-4';
                div.innerHTML = `
                    <div class="flex items-center gap-3 min-w-[120px]">
                        <span class="bg-rose-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">${index + 1}</span>
                        <span class="font-bold text-lg text-rose-800">外圈顏色</span>
                    </div>
                    <input type="color" value="${layer.color}" oninput="updateLayer(${index}, 'color', this.value)" class="shrink-0">
                    <div class="flex-1 min-w-[200px]">
                        <span class="block text-sm font-bold text-rose-700 mb-1">邊界粗細</span>
                        <input type="range" min="0" max="50" value="${layer.width}" oninput="updateLayer(${index}, 'width', this.value)" class="w-full">
                    </div>
                    ${index > 0 ? `<button onclick="removeOutlineLayer(${index})" class="bg-gray-200 text-gray-600 w-10 h-10 rounded-full font-bold text-xl">✕</button>` : '<div class="w-10"></div>'}
                `;
                outlineLayersList.appendChild(div);
            });
        }

        function updateLayer(index, key, val) {
            outlineLayers[index][key] = key === 'width' ? parseInt(val) : val;
            updateStyle();
        }

        function updateStyle() {
            const size = document.getElementById('font-size').value;
            const lh = document.getElementById('line-height').value;
            const ls = document.getElementById('letter-spacing').value;
            const shadowOn = document.getElementById('toggle-shadow').checked;

            document.getElementById('val-font-size').textContent = size;
            document.getElementById('val-line-height').textContent = lh;
            document.getElementById('val-letter-spacing').textContent = ls;

            textPreview.style.fontSize = `${size}px`;
            textPreview.style.lineHeight = lh;
            textPreview.style.letterSpacing = `${ls}px`;
            textPreview.style.textAlign = textAlign;

            let shadowStyles = [];
            textPreview.style.webkitTextStroke = `${outlineLayers[0].width}px ${outlineLayers[0].color}`;
            
            let currentFullWidth = outlineLayers[0].width;
            for(let i = 1; i < outlineLayers.length; i++) {
                currentFullWidth += outlineLayers[i].width;
                const c = outlineLayers[i].color;
                const w = currentFullWidth;
                shadowStyles.push(`${w}px 0 0 ${c}, -${w}px 0 0 ${c}, 0 ${w}px 0 ${c}, 0 -${w}px 0 ${c}`);
            }

            if (shadowOn) {
                shadowStyles.push(`10px 10px 20px rgba(0,0,0,0.4)`);
            }
            textPreview.style.textShadow = shadowStyles.join(', ');

            const pickers = document.querySelectorAll('.char-picker');
            const singleColor = document.getElementById('single-text-color').value;
            let charCount = 0;

            textPreview.innerHTML = textInput.value.split('').map(ch => {
                if (ch === '\n') return '<br>';
                const color = colorMode === 'single' ? singleColor : (pickers[charCount]?.value || '#000');
                charCount++;
                return `<span style="color: ${color}">${ch}</span>`;
            }).join('');
        }

        function downloadPNG(whiteBg) {
            const scale = 2; 
            const size = parseInt(document.getElementById('font-size').value);
            const lh = parseFloat(document.getElementById('line-height').value);
            const ls = parseInt(document.getElementById('letter-spacing').value);
            const shadowOn = document.getElementById('toggle-shadow').checked;

            const lines = textInput.value.split('\n');
            const fontFamily = textPreview.style.fontFamily || "GenSenRounded, sans-serif";

            const measure = document.createElement('canvas');
            const mCtx = measure.getContext('2d');
            mCtx.font = `bold ${size}px ${fontFamily}`;
            
            let maxW = 0;
            lines.forEach(l => {
                let w = 0;
                for(let char of l) w += mCtx.measureText(char).width + ls;
                maxW = Math.max(maxW, w);
            });

            const totalH = size * lh * lines.length;
            const outlineTotalWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
            const pad = outlineTotalWidth + (shadowOn ? 40 : 20);

            const canvas = document.createElement('canvas');
            const contentW = maxW + pad * 2;
            const contentH = totalH + pad * 2;
            
            canvas.width = contentW * scale;
            canvas.height = contentH * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);

            if (whiteBg) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, contentW, contentH);
            }

            ctx.font = `bold ${size}px ${fontFamily}`;
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round';

            const pickers = document.querySelectorAll('.char-picker');
            let pIdx = 0;

            lines.forEach((line, lineIdx) => {
                let lineW = 0;
                for(let char of line) lineW += ctx.measureText(char).width + ls;
                
                let startX = pad;
                if (textAlign === 'center') startX = pad + (maxW - lineW) / 2;
                if (textAlign === 'right') startX = pad + (maxW - lineW);
                
                const y = pad + (size * lh * lineIdx) + (size * lh / 2);

                let currentX = startX;
                for(let char of line) {
                    const charW = ctx.measureText(char).width;
                    const charColor = colorMode === 'single' ? document.getElementById('single-text-color').value : (pickers[pIdx]?.value || '#000');

                    if (shadowOn) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = "rgba(0,0,0,0.4)";
                        ctx.shadowOffsetX = 10;
                        ctx.shadowOffsetY = 10;
                        ctx.strokeText(char, currentX, y);
                    }
                    ctx.shadowColor = "transparent";

                    let runningWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
                    for(let i = outlineLayers.length - 1; i >= 0; i--) {
                        ctx.strokeStyle = outlineLayers[i].color;
                        ctx.lineWidth = runningWidth * 2;
                        ctx.strokeText(char, currentX, y);
                        runningWidth -= outlineLayers[i].width;
                    }

                    ctx.fillStyle = charColor;
                    ctx.fillText(char, currentX, y);

                    currentX += charW + ls;
                    pIdx++;
                }
                pIdx++; 
            });

            const link = document.createElement('a');
            link.download = whiteBg ? '我的大字作品_白色背景.png' : '我的大字作品_透明背景.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
