<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="01.png">
    <title>一個字一種顏色</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'GenSenRounded';
            src: url('GenSenRounded2TW-H.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fdf2f8; 
        }

        /* 大尺寸滑桿 */
        input[type="range"] {
            height: 40px;
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #d4a5d9; 
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: #f0d7f2;
            border-radius: 5px;
        }

        /* 大尺寸選色器 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .preview-bg {
            background-color: white;
            border: 2px solid #f5d0fe;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.03);
        }

        #text-preview {
            display: inline-block;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'GenSenRounded', "Microsoft JhengHei", sans-serif;
            font-weight: normal; 
        }

        .active-btn {
            background-color: #be185d !important; 
            color: white !important;
            border-color: #9d174d !important;
        }

        .step-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #fbcfe8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
        }

        .big-label {
            font-size: 1.15rem;
            font-weight: 600;
            color: #86198f; 
            margin-bottom: 10px;
            display: block;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.5em;
            padding-right: 3rem;
        }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <header class="bg-fuchsia-100 text-fuchsia-800 p-6 text-center shadow-sm border-b border-fuchsia-200">
        <h1 class="text-3xl font-bold mb-1">❤ 一個字一種顏色 ❤</h1>
        <p class="text-lg opacity-80">Billy ^.^ | Program improved by AI @2026</p>
    </header>

    <div class="container mx-auto p-4 max-w-6xl">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/2 space-y-6">
                
                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-fuchsia-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                        步驟一：輸入內容
                    </h2>
                    <textarea id="text-input" rows="2" class="w-full p-4 text-xl border-2 border-fuchsia-100 rounded-xl focus:border-fuchsia-300 outline-none" placeholder="請輸入文字...">平安喜樂</textarea>
                    
                    <div class="mt-4">
                        <span class="big-label">文字對齊方式</span>
                        <div class="flex gap-3">
                            <button onclick="setAlign('left', this)" class="align-btn flex-1 py-3 rounded-xl border-2 border-fuchsia-100 font-medium hover:bg-fuchsia-50">靠左</button>
                            <button onclick="setAlign('center', this)" class="align-btn active-btn flex-1 py-3 rounded-xl border-2 border-fuchsia-100 font-medium">置中</button>
                            <button onclick="setAlign('right', this)" class="align-btn flex-1 py-3 rounded-xl border-2 border-fuchsia-100 font-medium hover:bg-fuchsia-50">靠右</button>
                        </div>
                    </div>
                </div>

                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-fuchsia-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                        步驟二：選擇顏色模式
                    </h2>
                    <div class="flex gap-3 mb-6">
                        <button id="mode-multi" onclick="setColorMode('multi')" class="mode-btn flex-1 py-3 rounded-xl border-2 border-fuchsia-100 font-medium active-btn">每個字不同顏色</button>
                        <button id="mode-single" onclick="setColorMode('single')" class="mode-btn flex-1 py-3 rounded-xl border-2 border-fuchsia-100 font-medium hover:bg-fuchsia-50">全部統一顏色</button>
                    </div>

                    <div id="single-color-ctrl" class="hidden flex flex-col items-center gap-2 p-4 bg-fuchsia-50 rounded-xl border border-fuchsia-100">
                        <span class="text-lg font-medium">選擇主文字顏色：</span>
                        <input type="color" id="single-text-color" value="#be185d" oninput="updateStyle()">
                    </div>

                    <div id="multi-color-container" class="max-h-52 overflow-y-auto p-4 bg-fuchsia-50/30 rounded-xl flex flex-wrap gap-4 justify-center">
                    </div>
                </div>

                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-fuchsia-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>
                        步驟三：調整文字樣式
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="big-label">字體大小：<span id="val-font-size" class="text-fuchsia-600">80</span> px</label>
                            <input type="range" id="font-size" min="30" max="250" value="80">
                        </div>
                        <div>
                            <label class="big-label">行距 (上下排距離)：<span id="val-line-height" class="text-fuchsia-600">1.2</span></label>
                            <input type="range" id="line-height" min="0.5" max="2.5" step="0.1" value="1.2">
                        </div>
                        <div>
                            <label class="big-label">字距 (左右字間隔)：<span id="val-letter-spacing" class="text-fuchsia-600">2</span> px</label>
                            <input type="range" id="letter-spacing" min="-5" max="80" value="2">
                        </div>
                    </div>
                </div>

                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-fuchsia-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">4</span>
                        步驟四：設定文字邊框
                    </h2>
                    <div id="outline-layers-list" class="space-y-4">
                    </div>
                    <button onclick="addOutlineLayer()" class="mt-4 w-full py-3 bg-pink-400 hover:bg-pink-500 text-white text-lg font-bold rounded-xl shadow transition-all">
                        + 新增一層邊框
                    </button>
                    
                    <div class="mt-6 p-4 bg-amber-50 rounded-xl border border-amber-100">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="toggle-shadow" class="w-6 h-6">
                            <span class="text-lg font-medium text-amber-900">增加柔和陰影</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-1/2 lg:sticky lg:top-4 h-fit">
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-fuchsia-100">
                    <h2 class="text-2xl font-bold mb-4 text-center text-fuchsia-800">作品預覽</h2>
                    <div class="preview-bg rounded-xl overflow-hidden flex justify-center items-center p-8 min-h-[400px]">
                        <div id="text-preview"></div>
                    </div>

                    <div class="mt-8 space-y-4">
                        <div class="bg-fuchsia-50/50 p-5 rounded-xl">
                            <span class="big-label">下載設定</span>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-bold text-fuchsia-800 mb-2">選擇下載圖片大小：</label>
                                <select id="download-size-select" class="w-full p-3 text-lg border-2 border-fuchsia-100 rounded-xl outline-none focus:border-fuchsia-300">
                                    <option value="370x320">預設值 (370 x 320)</option>
                                    <option value="auto">原圖大小 (跟隨內容)</option>
                                    <option value="1280x720">1280 x 720 (16:9)</option>
                                    <option value="1920x1080">1920 x 1080 (HD)</option>
                                    <option value="1080x1080">1080 x 1080 (方形)</option>
                                    <option value="1080x1920">1080 x 1920 (手機)</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="generateImage(false)" class="py-4 bg-teal-500 hover:bg-teal-600 text-white text-lg font-bold rounded-xl shadow transition-all">
                                    下載透明背景
                                </button>
                                
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 text-center">
                        <label class="cursor-pointer inline-flex items-center gap-2 text-fuchsia-600 font-medium hover:underline text-sm">
                            <input type="file" id="font-upload" accept=".ttf,.otf" class="hidden">
                            <span>📂 更換自定義字體檔案</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const textPreview = document.getElementById('text-preview');
        const outlineLayersList = document.getElementById('outline-layers-list');
        const multiColorContainer = document.getElementById('multi-color-container');

        let colorMode = 'multi';
        let textAlign = 'center';
        // 預設外框粗細調整為 1，顏色為黑色
        let outlineLayers = [
            { width: 1, color: '#000000' }
        ];

        window.onload = () => {
            renderOutlineControls();
            handleTextInput();
            updateStyle();
        };

        textInput.addEventListener('input', handleTextInput);
        ['font-size', 'line-height', 'letter-spacing', 'toggle-shadow', 'single-text-color'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateStyle);
        });

        document.getElementById('font-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const font = new FontFace('userFont', `url(${event.target.result})`);
                font.load().then(f => {
                    document.fonts.add(f);
                    textPreview.style.fontFamily = 'userFont';
                    updateStyle();
                });
            };
            reader.readAsDataURL(file);
        });

        function handleTextInput() {
            const text = textInput.value;
            const currentColors = Array.from(document.querySelectorAll('.char-picker')).map(p => p.value);
            multiColorContainer.innerHTML = '';
            
            // 更柔和的預設顏色 (粉蠟筆調)
            const palette = [
                '#f4a7b9', // 淡粉
                '#8ed1e1', // 淡藍
                '#a8d8b9', // 淡綠
                '#fcd38a', // 淺橘
                '#c0abde', // 淺紫
                '#9ac1d9'  // 灰藍
            ];
            let charIndex = 0;

            text.split('').forEach(char => {
                if (char === '\n') return;
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center bg-white p-2 rounded-xl border border-fuchsia-50 shadow-sm';
                div.innerHTML = `
                    <span class="text-lg font-medium mb-1">${char}</span>
                    <input type="color" class="char-picker" value="${currentColors[charIndex] || palette[charIndex % palette.length]}" oninput="updateStyle()">
                `;
                multiColorContainer.appendChild(div);
                charIndex++;
            });
            updateStyle();
        }

        function setColorMode(mode) {
            colorMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active-btn', b.id === `mode-${mode}`));
            document.getElementById('single-color-ctrl').classList.toggle('hidden', mode !== 'single');
            document.getElementById('multi-color-container').classList.toggle('hidden', mode !== 'multi');
            updateStyle();
        }

        function setAlign(align, btn) {
            textAlign = align;
            document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            updateStyle();
        }

        function addOutlineLayer() {
            outlineLayers.push({ width: 5, color: '#ffffff' });
            renderOutlineControls();
            updateStyle();
        }

        function removeOutlineLayer(index) {
            if (outlineLayers.length <= 1) return;
            outlineLayers.splice(index, 1);
            renderOutlineControls();
            updateStyle();
        }

        function renderOutlineControls() {
            outlineLayersList.innerHTML = '';
            outlineLayers.forEach((layer, index) => {
                const div = document.createElement('div');
                div.className = 'bg-fuchsia-50/50 p-4 rounded-xl border border-fuchsia-100 flex flex-wrap items-center gap-4';
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="bg-fuchsia-400 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${index + 1}</span>
                        <span class="font-medium text-fuchsia-800">顏色</span>
                        <input type="color" value="${layer.color}" oninput="updateLayer(${index}, 'color', this.value)" class="shrink-0">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <span class="block text-xs font-bold text-fuchsia-700 mb-1">粗細</span>
                        <input type="range" min="0" max="40" value="${layer.width}" oninput="updateLayer(${index}, 'width', this.value)" class="w-full">
                    </div>
                    ${index > 0 ? `<button onclick="removeOutlineLayer(${index})" class="text-pink-400 font-bold px-2 hover:text-pink-600">✕</button>` : '<div class="w-6"></div>'}
                `;
                outlineLayersList.appendChild(div);
            });
        }

        function updateLayer(index, key, val) {
            outlineLayers[index][key] = key === 'width' ? parseInt(val) : val;
            updateStyle();
        }

        function updateStyle() {
            const size = document.getElementById('font-size').value;
            const lh = document.getElementById('line-height').value;
            const ls = document.getElementById('letter-spacing').value;
            const shadowOn = document.getElementById('toggle-shadow').checked;

            document.getElementById('val-font-size').textContent = size;
            document.getElementById('val-line-height').textContent = lh;
            document.getElementById('val-letter-spacing').textContent = ls;

            textPreview.style.fontSize = `${size}px`;
            textPreview.style.lineHeight = lh;
            textPreview.style.letterSpacing = `${ls}px`;
            textPreview.style.textAlign = textAlign;

            let shadowStyles = [];
            textPreview.style.webkitTextStroke = `${outlineLayers[0].width}px ${outlineLayers[0].color}`;
            
            let currentFullWidth = outlineLayers[0].width;
            for(let i = 1; i < outlineLayers.length; i++) {
                currentFullWidth += outlineLayers[i].width;
                const c = outlineLayers[i].color;
                const w = currentFullWidth;
                shadowStyles.push(`${w}px 0 0 ${c}, -${w}px 0 0 ${c}, 0 ${w}px 0 ${c}, 0 -${w}px 0 ${c}`);
            }

            if (shadowOn) {
                shadowStyles.push(`5px 5px 12px rgba(0,0,0,0.15)`);
            }
            textPreview.style.textShadow = shadowStyles.join(', ');

            const pickers = document.querySelectorAll('.char-picker');
            const singleColor = document.getElementById('single-text-color').value;
            let charCount = 0;

            textPreview.innerHTML = textInput.value.split('').map(ch => {
                if (ch === '\n') return '<br>';
                const color = colorMode === 'single' ? singleColor : (pickers[charCount]?.value || '#000');
                charCount++;
                return `<span style="color: ${color}">${ch}</span>`;
            }).join('');
        }

        function generateImage(whiteBg) {
            const selectVal = document.getElementById('download-size-select').value;
            let targetW = 0, targetH = 0;
            if (selectVal !== 'auto') {
                const parts = selectVal.split('x');
                targetW = parseInt(parts[0]);
                targetH = parseInt(parts[1]);
            }

            const scale = 2; 
            const size = parseInt(document.getElementById('font-size').value);
            const lh = parseFloat(document.getElementById('line-height').value);
            const ls = parseInt(document.getElementById('letter-spacing').value);
            const shadowOn = document.getElementById('toggle-shadow').checked;

            const lines = textInput.value.split('\n');
            const fontFamily = textPreview.style.fontFamily || "GenSenRounded, sans-serif";

            const measureCanvas = document.createElement('canvas');
            const mCtx = measureCanvas.getContext('2d');
            mCtx.font = `${size}px ${fontFamily}`;
            
            let contentMaxW = 0;
            lines.forEach(l => {
                let w = 0;
                for(let char of l) w += mCtx.measureText(char).width + ls;
                contentMaxW = Math.max(contentMaxW, w);
            });

            const contentTotalH = size * lh * lines.length;
            const outlineTotalWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
            const pad = outlineTotalWidth + (shadowOn ? 30 : 15);

            const srcW = contentMaxW + pad * 2;
            const srcH = contentTotalH + pad * 2;
            const srcCanvas = document.createElement('canvas');
            srcCanvas.width = srcW * scale;
            srcCanvas.height = srcH * scale;
            const sCtx = srcCanvas.getContext('2d');
            sCtx.scale(scale, scale);

            sCtx.font = `${size}px ${fontFamily}`;
            sCtx.textBaseline = 'middle';
            sCtx.lineJoin = 'round';

            const pickers = document.querySelectorAll('.char-picker');
            let pIdx = 0;

            lines.forEach((line, lineIdx) => {
                let lineW = 0;
                for(let char of line) lineW += sCtx.measureText(char).width + ls;
                let startX = pad;
                if (textAlign === 'center') startX = pad + (contentMaxW - lineW) / 2;
                if (textAlign === 'right') startX = pad + (contentMaxW - lineW);
                const y = pad + (size * lh * lineIdx) + (size * lh / 2);
                let currentX = startX;

                for(let char of line) {
                    const charW = sCtx.measureText(char).width;
                    const charColor = colorMode === 'single' ? document.getElementById('single-text-color').value : (pickers[pIdx]?.value || '#000');
                    if (shadowOn) {
                        sCtx.shadowBlur = 12; sCtx.shadowColor = "rgba(0,0,0,0.15)";
                        sCtx.shadowOffsetX = 5; sCtx.shadowOffsetY = 5;
                        sCtx.strokeText(char, currentX, y);
                    }
                    sCtx.shadowColor = "transparent";
                    let runningWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
                    for(let i = outlineLayers.length - 1; i >= 0; i--) {
                        sCtx.strokeStyle = outlineLayers[i].color;
                        sCtx.lineWidth = runningWidth * 2;
                        sCtx.strokeText(char, currentX, y);
                        runningWidth -= outlineLayers[i].width;
                    }
                    sCtx.fillStyle = charColor;
                    sCtx.fillText(char, currentX, y);
                    currentX += charW + ls;
                    pIdx++;
                }
                pIdx++; 
            });

            let finalCanvas = srcCanvas;
            if (targetW > 0 && targetH > 0) {
                finalCanvas = document.createElement('canvas');
                finalCanvas.width = targetW;
                finalCanvas.height = targetH;
                const fCtx = finalCanvas.getContext('2d');

                if (whiteBg) {
                    fCtx.fillStyle = '#ffffff';
                    fCtx.fillRect(0, 0, targetW, targetH);
                }

                const scaleX = targetW / (srcCanvas.width / scale);
                const scaleY = targetH / (srcCanvas.height / scale);
                const drawScale = Math.min(scaleX, scaleY) * 0.9;

                const drawW = (srcCanvas.width / scale) * drawScale;
                const drawH = (srcCanvas.height / scale) * drawScale;
                const offX = (targetW - drawW) / 2;
                const offY = (targetH - drawH) / 2;

                fCtx.imageSmoothingEnabled = true;
                fCtx.imageSmoothingQuality = 'high';
                fCtx.drawImage(srcCanvas, offX, offY, drawW, drawH);
            } else if (whiteBg) {
                finalCanvas = document.createElement('canvas');
                finalCanvas.width = srcCanvas.width;
                finalCanvas.height = srcCanvas.height;
                const fCtx = finalCanvas.getContext('2d');
                fCtx.fillStyle = '#ffffff';
                fCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                fCtx.drawImage(srcCanvas, 0, 0);
            }

            const link = document.createElement('a');
            link.download = `文字作品_${selectVal}_${whiteBg?'白底':'透明'}.png`;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
