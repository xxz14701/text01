<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="01.png">
    <title>一個文字一種顏色</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'GenSenRounded';
            src: url('GenSenRounded2TW-H.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fef2f2;
        }

        /* 大尺寸滑桿，方便操作 */
        input[type="range"] {
            height: 40px;
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #e11d48;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 2px solid white;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: #fbcece;
            border-radius: 5px;
        }

        /* 大尺寸選色器 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .preview-bg {
            background-color: white;
            border: 2px solid #fecdd3;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        #text-preview {
            display: inline-block;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'GenSenRounded', "Microsoft JhengHei", sans-serif;
            /* 移除強制粗體，讓視覺更舒服 */
            font-weight: normal; 
        }

        .active-btn {
            background-color: #e11d48 !important;
            color: white !important;
            border-color: #be123c !important;
        }

        .step-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #fecdd3;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .big-label {
            font-size: 1.15rem;
            font-weight: 600;
            color: #9f1239;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <header class="bg-rose-600 text-white p-6 text-center shadow-md">
        <h1 class="text-3xl font-bold mb-1">🍎 一個文字一種顏色 🍎</h1>
        <p class="text-lg opacity-90">Billy ^.^ | Program improved by AI @2026</p>
    </header>

    <div class="container mx-auto p-4 max-w-6xl">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 設定面板 -->
            <div class="w-full lg:w-1/2 space-y-6">
                
                <!-- 1: 輸入內容 -->
                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                        步驟一：輸入內容
                    </h2>
                    <textarea id="text-input" rows="2" class="w-full p-4 text-xl border-2 border-gray-200 rounded-xl focus:border-rose-400 outline-none" placeholder="請輸入文字...">平安喜樂</textarea>
                    
                    <div class="mt-4">
                        <span class="big-label">文字對齊方式</span>
                        <div class="flex gap-3">
                            <button onclick="setAlign('left', this)" class="align-btn flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium">靠左</button>
                            <button onclick="setAlign('center', this)" class="align-btn active-btn flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium">置中</button>
                            <button onclick="setAlign('right', this)" class="align-btn flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium">靠右</button>
                        </div>
                    </div>
                </div>

                <!-- 2: 顏色模式 -->
                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                        步驟二：選擇顏色模式
                    </h2>
                    <div class="flex gap-3 mb-6">
                        <button id="mode-multi" onclick="setColorMode('multi')" class="mode-btn flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium active-btn">每個字不同顏色</button>
                        <button id="mode-single" onclick="setColorMode('single')" class="mode-btn flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium">全部統一顏色</button>
                    </div>

                    <div id="single-color-ctrl" class="hidden flex flex-col items-center gap-2 p-4 bg-rose-50 rounded-xl border border-rose-100">
                        <span class="text-lg font-medium">選擇主文字顏色：</span>
                        <input type="color" id="single-text-color" value="#e11d48" oninput="updateStyle()">
                    </div>

                    <div id="multi-color-container" class="max-h-52 overflow-y-auto p-4 bg-gray-50 rounded-xl flex flex-wrap gap-4 justify-center">
                        <!-- 動態生成選色器 -->
                    </div>
                </div>

                <!-- 3: 字體與間距 -->
                <div class="step-card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="bg-rose-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>
                        步驟三：調整文字樣式
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="big-label">字體大小：<span id="val-font-size" class="text-rose-600">80</span> px</label>
                            <input type="range" id="font-size" min="30" max="250" value="80">
                        </div>
                        <div>
                            <label class="big-label">行距 (上下排距離)：<span id="val-line-height" class="text-rose-600">1.2</span></label>
                            <input type="range" id="line-height" min="0.5" max="2.5" step="0.1" value="1.2">
                        </div>
                        <div>
                            <label class="big-label">字距 (左右字間隔)：<span id="val-letter-spacing" class="text-rose-600">2</span> px</label>
                            <input type="range" id="letter-spacing" min="-5" max="80" value="2">
                        </div>
                    </div>
                </div>

                <!-- 4: 邊框 -->
                <div class="step-card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <span class="bg-rose-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">4</span>
                            步驟四：設定文字邊框
                        </h2>
                    </div>
                    <div id="outline-layers-list" class="space-y-1">
                        <!-- 動態邊框清單 -->
                    </div>
                    <button onclick="addOutlineLayer()" class="mt-4 w-full py-3 bg-orange-500 hover:bg-orange-600 text-white text-lg font-bold rounded-xl shadow transition-all">
                        + 新增一層邊框
                    </button>
                    
                    <div class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="toggle-shadow" class="w-6 h-6">
                            <span class="text-lg font-medium">增加立體陰影</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 預覽面板 -->
            <div class="w-full lg:w-1/2 lg:sticky lg:top-4 h-fit">
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-200">
                    <h2 class="text-2xl font-bold mb-4 text-center text-rose-800">作品預覽</h2>
                    <div class="preview-bg rounded-xl overflow-hidden flex justify-center items-center p-8 min-h-[400px]">
                        <div id="text-preview"></div>
                    </div>

                    <div class="mt-8 space-y-4">
                        <div class="bg-gray-50 p-5 rounded-xl">
                            <span class="big-label text-center">下載製作好的圖片</span>
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="downloadPNG(false)" class="py-4 bg-green-600 hover:bg-green-700 text-white text-lg font-bold rounded-xl shadow transition-all">
                                    下載透明背景
                                </button>
                                
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 text-center">
                        <label class="cursor-pointer inline-flex items-center gap-2 text-rose-600 font-medium hover:underline text-sm">
                            <input type="file" id="font-upload" accept=".ttf,.otf" class="hidden">
                            <span>📂 上傳字型</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const textPreview = document.getElementById('text-preview');
        const outlineLayersList = document.getElementById('outline-layers-list');
        const multiColorContainer = document.getElementById('multi-color-container');

        let colorMode = 'multi';
        let textAlign = 'center';
        // 預設邊框改為只有一層
        let outlineLayers = [
            { width: 4, color: '#000000' }
        ];

        window.onload = () => {
            renderOutlineControls();
            handleTextInput();
            updateStyle();
        };

        textInput.addEventListener('input', handleTextInput);
        ['font-size', 'line-height', 'letter-spacing', 'toggle-shadow', 'single-text-color'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateStyle);
        });

        document.getElementById('font-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const font = new FontFace('userFont', `url(${event.target.result})`);
                font.load().then(f => {
                    document.fonts.add(f);
                    textPreview.style.fontFamily = 'userFont';
                    updateStyle();
                });
            };
            reader.readAsDataURL(file);
        });

        function handleTextInput() {
            const text = textInput.value;
            const currentColors = Array.from(document.querySelectorAll('.char-picker')).map(p => p.value);
            multiColorContainer.innerHTML = '';
            
            const palette = ['#e11d48', '#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777'];
            let charIndex = 0;

            text.split('').forEach(char => {
                if (char === '\n') return;
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center bg-white p-2 rounded-xl border border-gray-100 shadow-sm';
                div.innerHTML = `
                    <span class="text-lg font-medium mb-1">${char}</span>
                    <input type="color" class="char-picker" value="${currentColors[charIndex] || palette[charIndex % palette.length]}" oninput="updateStyle()">
                `;
                multiColorContainer.appendChild(div);
                charIndex++;
            });
            updateStyle();
        }

        function setColorMode(mode) {
            colorMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active-btn', b.id === `mode-${mode}`));
            document.getElementById('single-color-ctrl').classList.toggle('hidden', mode !== 'single');
            document.getElementById('multi-color-container').classList.toggle('hidden', mode !== 'multi');
            updateStyle();
        }

        function setAlign(align, btn) {
            textAlign = align;
            document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            updateStyle();
        }

        function addOutlineLayer() {
            outlineLayers.push({ width: 5, color: '#ffffff' });
            renderOutlineControls();
            updateStyle();
        }

        function removeOutlineLayer(index) {
            if (outlineLayers.length <= 1) return;
            outlineLayers.splice(index, 1);
            renderOutlineControls();
            updateStyle();
        }

        function renderOutlineControls() {
            outlineLayersList.innerHTML = '';
            outlineLayers.forEach((layer, index) => {
                const div = document.createElement('div');
                div.className = 'bg-rose-50 p-4 rounded-xl border border-rose-100 flex flex-wrap items-center gap-4';
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="bg-rose-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${index + 1}</span>
                        <span class="font-medium text-rose-800">顏色</span>
                        <input type="color" value="${layer.color}" oninput="updateLayer(${index}, 'color', this.value)" class="shrink-0">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <span class="block text-xs font-bold text-rose-700 mb-1">粗細</span>
                        <input type="range" min="0" max="40" value="${layer.width}" oninput="updateLayer(${index}, 'width', this.value)" class="w-full">
                    </div>
                    ${index > 0 ? `<button onclick="removeOutlineLayer(${index})" class="text-red-500 font-bold px-2">✕</button>` : '<div class="w-6"></div>'}
                `;
                outlineLayersList.appendChild(div);
            });
        }

        function updateLayer(index, key, val) {
            outlineLayers[index][key] = key === 'width' ? parseInt(val) : val;
            updateStyle();
        }

        function updateStyle() {
            const size = document.getElementById('font-size').value;
            const lh = document.getElementById('line-height').value;
            const ls = document.getElementById('letter-spacing').value;
            const shadowOn = document.getElementById('toggle-shadow').checked;

            document.getElementById('val-font-size').textContent = size;
            document.getElementById('val-line-height').textContent = lh;
            document.getElementById('val-letter-spacing').textContent = ls;

            textPreview.style.fontSize = `${size}px`;
            textPreview.style.lineHeight = lh;
            textPreview.style.letterSpacing = `${ls}px`;
            textPreview.style.textAlign = textAlign;

            let shadowStyles = [];
            textPreview.style.webkitTextStroke = `${outlineLayers[0].width}px ${outlineLayers[0].color}`;
            
            let currentFullWidth = outlineLayers[0].width;
            for(let i = 1; i < outlineLayers.length; i++) {
                currentFullWidth += outlineLayers[i].width;
                const c = outlineLayers[i].color;
                const w = currentFullWidth;
                shadowStyles.push(`${w}px 0 0 ${c}, -${w}px 0 0 ${c}, 0 ${w}px 0 ${c}, 0 -${w}px 0 ${c}`);
            }

            if (shadowOn) {
                shadowStyles.push(`8px 8px 16px rgba(0,0,0,0.3)`);
            }
            textPreview.style.textShadow = shadowStyles.join(', ');

            const pickers = document.querySelectorAll('.char-picker');
            const singleColor = document.getElementById('single-text-color').value;
            let charCount = 0;

            textPreview.innerHTML = textInput.value.split('').map(ch => {
                if (ch === '\n') return '<br>';
                const color = colorMode === 'single' ? singleColor : (pickers[charCount]?.value || '#000');
                charCount++;
                return `<span style="color: ${color}">${ch}</span>`;
            }).join('');
        }

        function downloadPNG(whiteBg) {
            const scale = 2; 
            const size = parseInt(document.getElementById('font-size').value);
            const lh = parseFloat(document.getElementById('line-height').value);
            const ls = parseInt(document.getElementById('letter-spacing').value);
            const shadowOn = document.getElementById('toggle-shadow').checked;

            const lines = textInput.value.split('\n');
            const fontFamily = textPreview.style.fontFamily || "GenSenRounded, sans-serif";

            const measure = document.createElement('canvas');
            const mCtx = measure.getContext('2d');
            mCtx.font = `${size}px ${fontFamily}`;
            
            let maxW = 0;
            lines.forEach(l => {
                let w = 0;
                for(let char of l) w += mCtx.measureText(char).width + ls;
                maxW = Math.max(maxW, w);
            });

            const totalH = size * lh * lines.length;
            const outlineTotalWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
            const pad = outlineTotalWidth + (shadowOn ? 30 : 15);

            const canvas = document.createElement('canvas');
            const contentW = maxW + pad * 2;
            const contentH = totalH + pad * 2;
            
            canvas.width = contentW * scale;
            canvas.height = contentH * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);

            if (whiteBg) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, contentW, contentH);
            }

            ctx.font = `${size}px ${fontFamily}`;
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round';

            const pickers = document.querySelectorAll('.char-picker');
            let pIdx = 0;

            lines.forEach((line, lineIdx) => {
                let lineW = 0;
                for(let char of line) lineW += ctx.measureText(char).width + ls;
                
                let startX = pad;
                if (textAlign === 'center') startX = pad + (maxW - lineW) / 2;
                if (textAlign === 'right') startX = pad + (maxW - lineW);
                
                const y = pad + (size * lh * lineIdx) + (size * lh / 2);

                let currentX = startX;
                for(let char of line) {
                    const charW = ctx.measureText(char).width;
                    const charColor = colorMode === 'single' ? document.getElementById('single-text-color').value : (pickers[pIdx]?.value || '#000');

                    if (shadowOn) {
                        ctx.shadowBlur = 16;
                        ctx.shadowColor = "rgba(0,0,0,0.3)";
                        ctx.shadowOffsetX = 8;
                        ctx.shadowOffsetY = 8;
                        ctx.strokeText(char, currentX, y);
                    }
                    ctx.shadowColor = "transparent";

                    let runningWidth = outlineLayers.reduce((acc, curr) => acc + curr.width, 0);
                    for(let i = outlineLayers.length - 1; i >= 0; i--) {
                        ctx.strokeStyle = outlineLayers[i].color;
                        ctx.lineWidth = runningWidth * 2;
                        ctx.strokeText(char, currentX, y);
                        runningWidth -= outlineLayers[i].width;
                    }

                    ctx.fillStyle = charColor;
                    ctx.fillText(char, currentX, y);

                    currentX += charW + ls;
                    pIdx++;
                }
                pIdx++; 
            });

            const link = document.createElement('a');
            link.download = whiteBg ? '文字作品_白色背景.png' : '文字作品_透明背景.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
